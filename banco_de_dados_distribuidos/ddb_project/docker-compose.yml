services:
  mysql1:
    image: mysql:8.0
    container_name: mysql1
    hostname: mysql1
    networks:
      ddb_network:
        ipv4_address: 172.20.0.21
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ddb_database
      MYSQL_USER: ddb_user
      MYSQL_PASSWORD: ddb_password
    volumes:
      - mysql1_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql2:
    image: mysql:8.0
    container_name: mysql2
    hostname: mysql2
    networks:
      ddb_network:
        ipv4_address: 172.20.0.22
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ddb_database
      MYSQL_USER: ddb_user
      MYSQL_PASSWORD: ddb_password
    volumes:
      - mysql2_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3308:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  mysql3:
    image: mysql:8.0
    container_name: mysql3
    hostname: mysql3
    networks:
      ddb_network:
        ipv4_address: 172.20.0.23
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ddb_database
      MYSQL_USER: ddb_user
      MYSQL_PASSWORD: ddb_password
    volumes:
      - mysql3_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3309:3306"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  ddb-node1:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y default-mysql-client netcat-openbsd && rm -rf /var/lib/apt/lists/*
        RUN pip install mysql-connector-python
        WORKDIR /app
    container_name: ddb_node1
    hostname: node1
    networks:
      ddb_network:
        ipv4_address: 172.20.0.11
    ports:
      - "5001:5000"
    volumes:
      - ./ddb_node.py:/app/ddb_node.py
    environment:
      - PYTHONUNBUFFERED=1
    command: bash -c "sleep 5 && python ddb_node.py 1 5000 ddb_database"
    depends_on:
      mysql1:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "5000"]
      interval: 5s
      timeout: 3s
      retries: 10

  ddb-node2:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y default-mysql-client netcat-openbsd && rm -rf /var/lib/apt/lists/*
        RUN pip install mysql-connector-python
        WORKDIR /app
    container_name: ddb_node2
    hostname: node2
    networks:
      ddb_network:
        ipv4_address: 172.20.0.12
    ports:
      - "5002:5000"
    volumes:
      - ./ddb_node.py:/app/ddb_node.py
    environment:
      - PYTHONUNBUFFERED=1
    command: bash -c "sleep 15 && python ddb_node.py 2 5000 ddb_database 172.20.0.11:5000"
    depends_on:
      mysql2:
        condition: service_healthy
      ddb-node1:
        condition: service_healthy
    restart: unless-stopped

  ddb-node3:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.11-slim
        RUN apt-get update && apt-get install -y default-mysql-client netcat-openbsd && rm -rf /var/lib/apt/lists/*
        RUN pip install mysql-connector-python
        WORKDIR /app
    container_name: ddb_node3
    hostname: node3
    networks:
      ddb_network:
        ipv4_address: 172.20.0.13
    ports:
      - "5003:5000"
    volumes:
      - ./ddb_node.py:/app/ddb_node.py
    environment:
      - PYTHONUNBUFFERED=1
    command: bash -c "sleep 20 && python ddb_node.py 3 5000 ddb_database 172.20.0.11:5000"
    depends_on:
      mysql3:
        condition: service_healthy
      ddb-node1:
        condition: service_healthy
    restart: unless-stopped

networks:
  ddb_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql1_data:
  mysql2_data:
  mysql3_data: